<!doctype html>
<html lang="ar" dir="rtl" class="light">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/assets/images/logo/logo.jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="وصلني - خدمة نقل الركاب من دمياط إلى القاهرة والمطار. سيارات حديثة ومريحة وأسعار مناسبة." />
  <meta name="keywords" content="نقل ركاب, دمياط, القاهرة, المطار, وصلني, تاكسي, سيارات" />
  <title>وصلني - خدمة نقل الركاب</title>
  <!-- Preload Arabic font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Canonical URL managed by React Helmet -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wasalny.pages.dev/" />
  <meta property="og:title" content="وصلني - خدمة نقل الركاب من دمياط إلى القاهرة والمطار" />
  <meta property="og:description"
    content="خدمة نقل حديثة ومريحة من دمياط إلى القاهرة والمطار. أسطول متنوع من السيارات وأسعار تنافسية. احجز رحلتك الآن." />
  <meta property="og:image" content="https://wasalny.pages.dev/assets/images/logo/logo-1024.webp" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://wasalny.pages.dev/" />
  <meta name="twitter:title" content="وصلني - خدمة نقل الركاب" />
  <meta name="twitter:description"
    content="خدمة نقل حديثة ومريحة من دمياط إلى القاهرة والمطار. أسطول متنوع من السيارات وأسعار تنافسية." />
  <meta name="twitter:image" content="https://wasalny.pages.dev/assets/images/logo/logo-1024.webp" />
  <!-- Theme script to prevent FOUC - runs before React -->
  <script>
    (function () {
      const THEME_KEY = 'wasalny-theme';
      const storedTheme = localStorage.getItem(THEME_KEY);
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      let isDark = false;
      if (storedTheme === 'dark') {
        isDark = true;
      } else if (storedTheme === 'light') {
        isDark = false;
      } else {
        // system or no stored theme
        isDark = systemDark;
      }

      document.documentElement.classList.remove('light', 'dark');
      document.documentElement.classList.add(isDark ? 'dark' : 'light');
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
